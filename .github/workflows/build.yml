# Compilazione
- name: Compile
  run: mvn compile -f roman-number/pom.xml

# Esecuzione test
- name: Test
  run: mvn test -f roman-number/pom.xml

# Analisi statica
- name: Static analysis
  run: mvn checkstyle:check -f roman-number/pom.xml

# Genera report JaCoCo
- name: Generate JaCoCo report
  run: mvn jacoco:report -f roman-number/pom.xml

# Upload coverage su Coveralls
- name: Upload coverage to Coveralls
  uses: coverallsapp/github-action@v2
  with:
    github-token: ${{ secrets.GITHUB_TOKEN }}
    path-to-lcov: roman-number/target/site/jacoco/jacoco.xml
    format: jacoco