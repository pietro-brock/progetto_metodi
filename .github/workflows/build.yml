name: Build

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout del codice
      - name: Checkout repository
        uses: actions/checkout@v3

      # Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # Compilazione
      - name: Compile
        run: mvn compile -f roman-number/pom.xml

      # Esecuzione test
      - name: Test
        run: mvn test -f roman-number/pom.xml

      # Analisi statica
      - name: Static analysis
        run: mvn checkstyle:check -f roman-number/pom.xml

      # Upload coverage su Coveralls
      - name: Upload coverage to Coveralls
        run: mvn jacoco:report coveralls:report -f roman-number/pom.xml
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}